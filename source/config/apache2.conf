# Global configuration
#
# SERVER_PORT = {{ $SERVER_PORT }}
# HOST_DITHYRAMBIC_SITE = {{ $HOST_DITHYRAMBIC_SITE }}

# This is a template. The following env vars were substituted:
#

#
# ServerRoot: The top of the directory tree under which the server's
# configuration, error, and log files are kept.
#
# NOTE!  If you intend to place this on an NFS (or otherwise network)
# mounted filesystem then please read the Mutex documentation (available
# at <URL:http://httpd.apache.org/docs/2.4/mod/core.html#mutex>);
# you will save yourself a lot of trouble.
#
# Do NOT add a slash at the end of the directory path.
#
#ServerRoot "/etc/apache2"

#
# The accept serialization lock file MUST BE STORED ON A LOCAL DISK.
#
#Mutex file:${APACHE_LOCK_DIR} default

#
# The directory where shm and other runtime files will be stored.
#

DefaultRuntimeDir /var/run/apache2

#
# PidFile: The file in which the server should record its process
# identification number when it starts.
# This needs to be set in /etc/apache2/envvars
#
PidFile /var/run/apache2/apache2.pid

#
# Timeout: The number of seconds before receives and sends time out.
#
Timeout 300

#
# KeepAlive: Whether or not to allow persistent connections (more than
# one request per connection). Set to "Off" to deactivate.
#
KeepAlive On

#
# MaxKeepAliveRequests: The maximum number of requests to allow
# during a persistent connection. Set to 0 to allow an unlimited amount.
# We recommend you leave this number high, for maximum performance.
#
MaxKeepAliveRequests 100

#
# KeepAliveTimeout: Number of seconds to wait for the next request from the
# same client on the same connection.
#
KeepAliveTimeout 5

# These need to be set in /etc/apache2/envvars
User www-data
Group www-data

#
# HostnameLookups: Log the names of clients or just their IP addresses
# e.g., www.apache.org (on) or 204.62.129.132 (off).
# The default is off because it'd be overall better for the net if people
# had to knowingly turn this feature on, since enabling it means that
# each client request will result in AT LEAST one lookup request to the
# nameserver.
#
HostnameLookups Off

# ErrorLog: The location of the error log file.
# If you do not specify an ErrorLog directive within a <VirtualHost>
# container, error messages relating to that virtual host will be
# logged here.  If you *do* define an error logfile for a <VirtualHost>
# container, that host's errors will be logged there and not here.
#
ErrorLog /app/build/logs/apache2_error.log

#
# LogLevel: Control the severity of messages logged to the error_log.
# Available values: trace8, ..., trace1, debug, info, notice, warn,
# error, crit, alert, emerg.
# It is also possible to configure the log level for particular modules, e.g.
# "LogLevel info ssl:warn"
#
LogLevel warn

#
# We enable modules directly here.
#
# Note: we just copy the contents of the files commented out above.
# TODO: determine which ones we don't need and remove them - we just included
# all of the ones in the default installation.
#


################################################################################
# MODULES BEGIN
################################################################################

# ------------------------------------------------------------------------------
# mod_access_compat
# ------------------------------------------------------------------------------
# Depends: authn_core
LoadModule access_compat_module /usr/lib/apache2/modules/mod_access_compat.so

# ------------------------------------------------------------------------------
# mod_alias
# ------------------------------------------------------------------------------
LoadModule alias_module /usr/lib/apache2/modules/mod_alias.so

# Aliases: Add here as many aliases as you need (with no limit). The format is
# Alias fakename realname
#
# Note that if you include a trailing / on fakename then the server will
# require it to be present in the URL.  So "/icons" isn't aliased in this
# example, only "/icons/".  If the fakename is slash-terminated, then the
# realname must also be slash terminated, and if the fakename omits the
# trailing slash, the realname must also omit it.
#
# We include the /icons/ alias for FancyIndexed directory listings.  If
# you do not use FancyIndexing, you may comment this out.

Alias /icons/ "/usr/share/apache2/icons/"

<Directory "/usr/share/apache2/icons">
        Options FollowSymlinks
        AllowOverride None
        Require all granted
</Directory>

# mod_auth_basic
# OMIT

# mod_authn_core
# OMIT

# mod_authn_file
# OMIT

# ------------------------------------------------------------------------------
# mod_authz_core
# ------------------------------------------------------------------------------
LoadModule authz_core_module /usr/lib/apache2/modules/mod_authz_core.so

# mod_authz_host
# OMIT

# mod_authz_user
# OMIT

# mod_autoindex
# OMIT

# ------------------------------------------------------------------------------
# mod_deflate
# ------------------------------------------------------------------------------
# Depends: filter
# TODO: edit out filters we don't need
LoadModule deflate_module /usr/lib/apache2/modules/mod_deflate.so

<IfModule mod_filter.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript
        AddOutputFilterByType DEFLATE application/x-javascript application/javascript application/ecmascript
        AddOutputFilterByType DEFLATE application/rss+xml
        AddOutputFilterByType DEFLATE application/wasm
        AddOutputFilterByType DEFLATE application/xml
</IfModule>

# ------------------------------------------------------------------------------
# mod_dir
# ------------------------------------------------------------------------------
LoadModule dir_module /usr/lib/apache2/modules/mod_dir.so

# We universally use home.html as the default page when a directory is hit.
DirectoryIndex index.html

# ------------------------------------------------------------------------------
# mod_env
# ------------------------------------------------------------------------------
LoadModule env_module /usr/lib/apache2/modules/mod_env.so

# mod_filter
# OMIT

# ------------------------------------------------------------------------------
# mod_mime
# ------------------------------------------------------------------------------
LoadModule mime_module /usr/lib/apache2/modules/mod_mime.so

# Copied from the original location.
Include /app/build/config/mime.conf

# ------------------------------------------------------------------------------
# mod_mpm_event
# ------------------------------------------------------------------------------
# Conflicts: mpm_worker mpm_prefork
# TODO: do we want this?
LoadModule mpm_event_module /usr/lib/apache2/modules/mod_mpm_event.so

# event MPM
# StartServers: initial number of server processes to start
# MinSpareThreads: minimum number of worker threads which are kept spare
# MaxSpareThreads: maximum number of worker threads which are kept spare
# ThreadsPerChild: constant number of worker threads in each server process
# MaxRequestWorkers: maximum number of worker threads
# MaxConnectionsPerChild: maximum number of requests a server process serves
StartServers            2
MinSpareThreads         25
MaxSpareThreads         75
ThreadLimit             64
ThreadsPerChild         25
MaxRequestWorkers       150
MaxConnectionsPerChild  0

# ------------------------------------------------------------------------------
# mod_negotiation
# ------------------------------------------------------------------------------
LoadModule negotiation_module /usr/lib/apache2/modules/mod_negotiation.so

# LanguagePriority allows you to give precedence to some languages
# in case of a tie during content negotiation.
#
# Just list the languages in decreasing order of preference. We have
# more or less alphabetized them here. You probably want to change this.
#
LanguagePriority en ca cs da de el eo es et fr he hr it ja ko ltz nl nn no pl pt pt-BR ru sv tr zh-CN zh-TW

#
# ForceLanguagePriority allows you to serve a result page rather than
# MULTIPLE CHOICES (Prefer) [in case of a tie] or NOT ACCEPTABLE (Fallback)
# [in case no accepted languages matched the available variants]
#
ForceLanguagePriority Prefer Fallback

# ------------------------------------------------------------------------------
# mod_reqtimeout
# ------------------------------------------------------------------------------
LoadModule reqtimeout_module /usr/lib/apache2/modules/mod_reqtimeout.so

# mod_reqtimeout limits the time waiting on the client to prevent an
# attacker from causing a denial of service by opening many connections
# but not sending requests. This file tries to give a sensible default
# configuration, but it may be necessary to tune the timeout values to
# the actual situation. Note that it is also possible to configure
# mod_reqtimeout per virtual host.


# Wait max 20 seconds for the first byte of the request line+headers
# From then, require a minimum data rate of 500 bytes/s, but don't
# wait longer than 40 seconds in total.
# Note: Lower timeouts may make sense on non-ssl virtual hosts but can
# cause problem with ssl enabled virtual hosts: This timeout includes
# the time a browser may need to fetch the CRL for the certificate. If
# the CRL server is not reachable, it may take more than 10 seconds
# until the browser gives up.
RequestReadTimeout header=20-40,minrate=500

# Wait max 10 seconds for the first byte of the request body (if any)
# From then, require a minimum data rate of 500 bytes/s
RequestReadTimeout body=10,minrate=500


# ------------------------------------------------------------------------------
# mod_setenvinf
# ------------------------------------------------------------------------------
LoadModule setenvif_module /usr/lib/apache2/modules/mod_setenvif.so
#
# The following directives modify normal HTTP response behavior to
# handle known problems with browser implementations.
#
# TODO: most if not all of these can be removed - they are simply never seen
#       in the wild any lionger.
BrowserMatch "Mozilla/2" nokeepalive
BrowserMatch "MSIE 4\.0b2;" nokeepalive downgrade-1.0 force-response-1.0
BrowserMatch "RealPlayer 4\.0" force-response-1.0
BrowserMatch "Java/1\.0" force-response-1.0
BrowserMatch "JDK/1\.0" force-response-1.0

#
# The following directive disables redirects on non-GET requests for
# a directory that does not include the trailing slash.  This fixes a
# problem with Microsoft WebFolders which does not appropriately handle
# redirects for folders with DAV methods.
# Same deal with Apple's DAV filesystem and Gnome VFS support for DAV.
#
BrowserMatch "Microsoft Data Access Internet Publishing Provider" redirect-carefully
BrowserMatch "MS FrontPage" redirect-carefully
BrowserMatch "^WebDrive" redirect-carefully
BrowserMatch "^WebDAVFS/1\.[012]" redirect-carefully
BrowserMatch "^gnome-vfs/1\.0" redirect-carefully
BrowserMatch "^gvfs/1" redirect-carefully
BrowserMatch "^XML Spy" redirect-carefully
BrowserMatch "^Dreamweaver-WebDAV-SCM1" redirect-carefully
BrowserMatch " Konqueror/4" redirect-carefully

# ------------------------------------------------------------------------------
# mod_status
# ------------------------------------------------------------------------------
# OMIT

# Added Modules
# The above are default - following are ones we've enabled

# ------------------------------------------------------------------------------
# mod_cgi
# ------------------------------------------------------------------------------
LoadModule cgi_module /usr/lib/apache2/modules/mod_cgi.so

# ------------------------------------------------------------------------------
# mod_cgid
# ------------------------------------------------------------------------------
LoadModule cgid_module /usr/lib/apache2/modules/mod_cgid.so

# ------------------------------------------------------------------------------
# mod_rewrite
# ------------------------------------------------------------------------------
LoadModule rewrite_module /usr/lib/apache2/modules/mod_rewrite.so

################################################################################
# MODULES END
################################################################################

